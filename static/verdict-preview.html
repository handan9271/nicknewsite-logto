<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Verdict Preview</title>
  <link rel="stylesheet" href="/static/game.css">
</head>
<body>
  <div id="verdict-screen" class="screen" style="display:flex;">
    <h2 class="verdict-header">法庭宣判</h2>

    <div class="score-cards">
      <div class="score-card revealed">
        <span class="score-label">流利度与连贯性</span>
        <span class="score-value">5.0</span>
      </div>
      <div class="score-card revealed">
        <span class="score-label">词汇量</span>
        <span class="score-value">6.0</span>
      </div>
      <div class="score-card revealed">
        <span class="score-label">语法</span>
        <span class="score-value">5.0</span>
      </div>
      <div class="score-card revealed">
        <span class="score-label">发音</span>
        <span class="score-value">6.0</span>
      </div>
    </div>

    <div class="overall-band">
      <span class="overall-label">总分</span>
      <span class="overall-value">5.5</span>
    </div>

    <p class="verdict-text">有罪！被告的口语水平仅够在菜市场砍价。</p>
    <p class="verdict-comment">你的回答像一碗没放盐的面——能吃，但毫无味道。词汇单调得像复读机，"I think" 和 "very good" 出现的次数比法庭旁听席的人还多。语法错误此起彼伏，法庭建议你先把基础句型练熟再来。</p>

    <div style="margin-top:30px;text-align:center;">
      <p style="font-family:'Ark Pixel','Zpix',monospace;font-size:24px;color:var(--gold);letter-spacing:4px;margin-bottom:16px;text-shadow:3px 3px 0 #000;max-width:600px;line-height:1.8;">令人失望的表现已记录在案，历史记录里有逐句分析和改进方案，去好好看吧</p>
      <button id="btn-new-trial" class="press-start blink" style="font-size:10px;padding:10px 24px;">再来一局</button>
    </div>
  </div>
</body>
</html>
