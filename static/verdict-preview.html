<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verdict Preview</title>
  <link rel="stylesheet" href="/static/game.css">
</head>
<body>
  <div id="verdict-screen" class="screen" style="display:flex;">
    <h2 class="verdict-header">法庭宣判</h2>

    <div class="score-cards">
      <div class="score-card revealed">
        <span class="score-label">流利度与连贯性</span>
        <span class="score-value">5.0</span>
      </div>
      <div class="score-card revealed">
        <span class="score-label">词汇量</span>
        <span class="score-value">6.0</span>
      </div>
      <div class="score-card revealed">
        <span class="score-label">语法</span>
        <span class="score-value">5.0</span>
      </div>
      <div class="score-card revealed">
        <span class="score-label">发音</span>
        <span class="score-value">6.0</span>
      </div>
    </div>

    <div class="overall-band">
      <span class="overall-label">总分</span>
      <span class="overall-value">5.5</span>
    </div>

    <p class="verdict-text">GUILTY! The defendant has failed to demonstrate Band 7 proficiency.</p>
    <p class="verdict-comment">Your fluency needs improvement. Practice speaking in longer, more connected sentences.</p>

    <div style="margin-top:30px;text-align:center;">
      <p style="font-family:'Ark Pixel','Zpix',monospace;font-size:24px;color:var(--gold);letter-spacing:6px;margin-bottom:16px;text-shadow:3px 3px 0 #000;">详细报告已保存至历史记录</p>
      <button id="btn-new-trial" class="press-start blink" style="font-size:10px;padding:10px 24px;">再来一局</button>
    </div>
  </div>
</body>
</html>
