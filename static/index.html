<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>尼克AI口语教练 · 考官视角升级</title>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --ink:      #1a1714; --ink-mid: #42403c; --ink-dim: #8a837a;
  --paper:    #faf8f4; --warm:    #f0ece0;
  --teal:     #0A5A45; --teal-dk: #063d2e; --teal-lt: #e4f3ee;
  --gold:     #C9963A; --gold-pale: #f5dfa0;
  --red:      #b83228; --red-bg: #fff2f0; --red-mark: #ffd2cb;
  --grn:      #1a6b35; --grn-bg: #f0faf3; --grn-mark: #b0e9c0;
  --blue:     #1A3A6B;
  --purple:   #4B3FA0; --purp-lt: #f3f1fd;
  --rule:     rgba(60,55,45,.12);
  --shadow:   0 2px 20px rgba(0,0,0,.08);
}
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'DM Sans',sans-serif; background:var(--warm); color:var(--ink); min-height:100vh; -webkit-font-smoothing:antialiased; }

#app { display:flex; min-height:100vh; }

/* ── SIDEBAR ── */
.sidebar {
  width:250px; background:var(--teal-dk);
  position:fixed; top:0; left:0; height:100vh;
  display:flex; flex-direction:column; z-index:100;
}
.sb-brand { padding:26px 22px 18px; border-bottom:1px solid rgba(255,255,255,.08); }
.sb-logo  { font-family:'EB Garamond',serif; font-size:16px; color:#fff; line-height:1.4; }
.sb-logo span { color:var(--gold-pale); }
.sb-tag   { font-size:9.5px; color:rgba(255,255,255,.35); margin-top:4px; letter-spacing:.5px; }
.sb-nav   { padding:14px 10px; flex:1; }
.nb {
  display:flex; align-items:center; gap:10px;
  padding:10px 13px; border-radius:8px;
  color:rgba(255,255,255,.55); font-size:13px;
  cursor:pointer; transition:background .15s,color .15s;
  margin-bottom:2px; border:none; background:none; width:100%; text-align:left;
}
.nb:hover { background:rgba(255,255,255,.08); color:#fff; }
.nb.on    { background:var(--teal); color:#fff; }
.nb .ico  { font-size:15px; }
.sb-user {
  padding:14px 22px 22px; border-top:1px solid rgba(255,255,255,.08);
  font-size:11.5px; color:rgba(255,255,255,.4);
}
.sb-av   { width:34px; height:34px; border-radius:50%; background:var(--teal); display:flex; align-items:center; justify-content:center; font-size:14px; margin-bottom:8px; }
.sb-un   { color:#fff; font-weight:500; font-size:13px; margin-bottom:2px; }
.sb-out  { margin-top:10px; background:none; border:1px solid rgba(255,255,255,.14); color:rgba(255,255,255,.4); padding:5px 11px; border-radius:6px; font-size:11.5px; cursor:pointer; transition:all .15s; }
.sb-out:hover { border-color:rgba(255,255,255,.4); color:#fff; }

/* ── MAIN ── */
.main { margin-left:250px; flex:1; display:flex; flex-direction:column; }
.view { display:none; flex:1; flex-direction:column; }
.view.on { display:flex; }

/* ── LOGIN ── */
#v-login { display:flex; align-items:center; justify-content:center; min-height:100vh; background:var(--warm); }
.login-box { background:var(--paper); border-radius:16px; box-shadow:var(--shadow); padding:48px 44px; width:420px; }
.ll { font-family:'EB Garamond',serif; font-size:24px; color:var(--teal-dk); margin-bottom:5px; }
.ll span { color:var(--gold); }
.ld { font-size:13px; color:var(--ink-dim); margin-bottom:32px; line-height:1.6; }
.fl { font-size:11.5px; font-weight:600; color:var(--ink-dim); letter-spacing:.5px; margin-bottom:7px; }
.fi { width:100%; padding:11px 14px; border:1.5px solid #e0d8ce; border-radius:8px; font-size:15px; font-family:'DM Sans',sans-serif; background:#fff; color:var(--ink); outline:none; transition:border .15s; margin-bottom:14px; }
.fi:focus { border-color:var(--teal); }
.demo-hint { font-size:11.5px; color:var(--ink-dim); background:var(--teal-lt); border:1px solid var(--teal); border-radius:6px; padding:10px 14px; margin-bottom:16px; line-height:1.6; }
.demo-hint strong { color:var(--teal); }
.btn-login { width:100%; padding:13px; background:var(--teal); color:#fff; border:none; border-radius:8px; font-size:15px; font-weight:600; cursor:pointer; transition:background .15s; }
.btn-login:hover { background:var(--teal-dk); }

/* ── PRACTICE ── */
#v-practice { padding:36px 44px; background:var(--warm); }
.ph { font-family:'EB Garamond',serif; font-size:25px; color:var(--teal-dk); margin-bottom:4px; }
.ps { font-size:13px; color:var(--ink-dim); margin-bottom:26px; }
.card { background:var(--paper); border-radius:12px; box-shadow:var(--shadow); padding:30px 34px; max-width:820px; }
.fl2 { font-size:11px; font-weight:600; letter-spacing:.8px; text-transform:uppercase; color:var(--ink-dim); margin-bottom:7px; }
.fl2 em { color:var(--red); font-style:normal; }
.fi2 { width:100%; padding:11px 15px; border:1.5px solid #e0d8ce; border-radius:8px; font-size:14px; font-family:'DM Sans',sans-serif; background:#fff; color:var(--ink); outline:none; transition:border .15s; }
.fi2:focus { border-color:var(--teal); }
textarea.fi2 { min-height:130px; resize:vertical; line-height:1.7; }
.fr { margin-bottom:20px; }

/* Part detector */
.part-detect-row { display:flex; align-items:center; gap:10px; margin-bottom:14px; flex-wrap:wrap; }
.part-detect-label { font-size:12px; color:var(--ink-dim); }
.part-badges { display:flex; gap:6px; }
.part-badge {
  padding:4px 12px; border-radius:20px; font-size:11.5px;
  border:1px solid #d8d0c8; color:var(--ink-dim);
  background:none; cursor:pointer; transition:all .15s;
  font-family:'DM Sans',sans-serif;
}
.part-badge:hover { border-color:var(--teal); color:var(--teal); }
.part-badge.on { background:var(--teal-lt); border-color:var(--teal); color:var(--teal); font-weight:600; }
.detect-hint {
  display:none; font-size:11.5px; color:var(--teal);
  background:var(--teal-lt); border:1px solid var(--teal);
  border-radius:6px; padding:7px 12px; margin-bottom:12px;
}
.detect-hint.on { display:block; }

/* Input mode toggle */
.mode-toggle { display:flex; gap:8px; margin-bottom:14px; }
.mode-btn {
  flex:1; padding:8px 14px; border-radius:8px;
  border:1.5px solid #e0d8ce; background:#fff;
  color:var(--ink-mid); font-size:12.5px; cursor:pointer;
  transition:all .15s; font-family:'DM Sans',sans-serif;
}
.mode-btn:hover { border-color:var(--teal); color:var(--teal); }
.mode-btn.on { background:var(--teal-lt); border-color:var(--teal); color:var(--teal); font-weight:600; }

.btn-gen {
  padding:12px 30px; background:var(--teal); color:#fff;
  border:none; border-radius:8px; font-size:14.5px; font-weight:600;
  cursor:pointer; transition:background .15s; display:flex; align-items:center; gap:8px;
}
.btn-gen:hover { background:var(--teal-dk); }
.btn-gen:disabled { opacity:.5; cursor:not-allowed; }
.spin { width:17px; height:17px; border:2px solid rgba(255,255,255,.3); border-top-color:#fff; border-radius:50%; animation:sp .7s linear infinite; display:none; }
.btn-gen.loading .spin { display:block; }
@keyframes sp { to { transform:rotate(360deg); } }
@keyframes fadeIn { from { opacity:0; transform:translateY(4px); } to { opacity:1; transform:translateY(0); } }

.quick-fills { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:20px; }
.qf-btn { padding:5px 12px; background:var(--teal-lt); color:var(--teal); border:1px solid var(--teal); border-radius:20px; font-size:11.5px; cursor:pointer; transition:all .15s; white-space:nowrap; }
.qf-btn:hover { background:var(--teal); color:#fff; }

/* ── REPORT ── */
#v-report { background:var(--warm); }
.r-actions { display:flex; align-items:center; gap:12px; padding:13px 44px; background:var(--warm); border-bottom:1px solid var(--rule); }
.btn-bk { display:flex; align-items:center; gap:6px; background:none; border:1.5px solid #d0c8be; color:var(--ink-mid); padding:7px 15px; border-radius:8px; font-size:13px; cursor:pointer; transition:all .15s; }
.btn-bk:hover { border-color:var(--teal); color:var(--teal); }
.btn-nw { padding:7px 18px; background:var(--teal); color:#fff; border:none; border-radius:8px; font-size:13px; font-weight:600; cursor:pointer; transition:background .15s; }
.btn-nw:hover { background:var(--teal-dk); }
.saved-note { margin-left:auto; font-size:11.5px; color:var(--ink-dim); }
#rep-wrap { padding:32px 44px; }

.r-box { background:var(--paper); border-radius:12px; box-shadow:var(--shadow); overflow:hidden; }
.r-head { background:var(--teal-dk); padding:28px 44px 24px; border-bottom:5px solid var(--gold); display:flex; justify-content:space-between; align-items:flex-end; }
.rht { font-family:'EB Garamond',serif; font-size:24px; color:#fff; line-height:1.2; }
.rhs { font-size:11px; color:rgba(255,255,255,.4); margin-top:4px; }
.rhm { text-align:right; font-size:10.5px; color:rgba(255,255,255,.4); line-height:1.9; }
.rhm strong { color:var(--gold-pale); font-weight:500; }
.r-body { padding:32px 44px 44px; }

/* Diagnosis block */
.diag-block {
  background:var(--teal-lt); border:1px solid var(--teal);
  border-radius:10px; padding:16px 20px; margin-bottom:24px;
}
.diag-title { font-size:10px; font-weight:600; letter-spacing:1px; text-transform:uppercase; color:var(--teal); margin-bottom:8px; }
.diag-scores { display:flex; gap:16px; margin-bottom:10px; flex-wrap:wrap; }
.diag-score { text-align:center; }
.ds-label { font-size:9px; font-family:'DM Mono',monospace; color:var(--ink-dim); letter-spacing:.5px; }
.ds-num { font-size:22px; font-weight:700; color:var(--teal-dk); font-family:'EB Garamond',serif; line-height:1.2; }
.diag-verdict { font-size:13px; color:var(--teal-dk); line-height:1.7; }
.diag-verdict strong { color:var(--teal); }
.part-framework-tag {
  display:inline-block; margin-bottom:10px;
  font-size:10.5px; padding:3px 10px; border-radius:10px;
  background:rgba(10,90,69,.12); color:var(--teal);
  border:1px solid var(--teal-lt);
}

/* Takeaway */
.takeaway-box {
  background:linear-gradient(135deg, #fdf8ee, #faf5e4);
  border:1.5px solid var(--gold);
  border-radius:10px; padding:16px 20px; margin-top:20px;
  display:flex; gap:14px; align-items:flex-start;
}
.tk-ico { font-size:20px; flex-shrink:0; margin-top:1px; }
.tk-label { font-size:9.5px; font-weight:600; letter-spacing:1px; text-transform:uppercase; color:var(--gold); margin-bottom:5px; }
.tk-text { font-size:13.5px; color:var(--ink); line-height:1.7; }
.tk-text strong { color:var(--teal-dk); }

.sess-row { display:flex; align-items:center; gap:14px; padding-bottom:18px; margin-bottom:20px; border-bottom:1px solid var(--rule); }
.s-ico { width:38px; height:38px; background:var(--teal); border-radius:50%; display:flex; align-items:center; justify-content:center; font-family:'EB Garamond',serif; font-size:17px; color:#fff; flex-shrink:0; }
.s-q { font-family:'EB Garamond',serif; font-size:19px; color:var(--teal-dk); flex:1; }
.s-sc { display:flex; align-items:center; gap:7px; }
.sc { font-family:'DM Mono',monospace; font-size:10.5px; padding:3px 11px; border-radius:20px; }
.sc-o { background:var(--red-bg); color:var(--red); border:1px solid var(--red-mark); }
.sc-n { background:var(--grn-bg); color:var(--grn); border:1px solid var(--grn-mark); font-weight:600; }
.sc-a { color:var(--ink-dim); }

.legend { display:flex; gap:20px; margin-bottom:16px; font-size:11px; color:var(--ink-dim); flex-wrap:wrap; }
.leg { display:flex; align-items:center; gap:6px; }
.ls { width:11px; height:11px; border-radius:3px; }
.ls-r { background:var(--red-mark); border:1px solid var(--red); }
.ls-g { background:var(--grn-mark); border:1px solid var(--grn); }
.leg-l { width:26px; height:2px; background:var(--blue); border-radius:1px; }

.diff-arena { display:grid; grid-template-columns:1fr 64px 1fr; margin-bottom:28px; }
.c-hd { padding:9px 16px; font-size:9.5px; font-weight:600; letter-spacing:1.2px; text-transform:uppercase; border-radius:6px 6px 0 0; }
.c-hd-r { background:var(--red); color:#fff; }
.c-hd-g { background:var(--grn); color:#fff; }
.c-bd { padding:18px 20px 22px; font-family:'EB Garamond',serif; font-size:15px; line-height:1.92; color:var(--ink-mid); }
.c-bd-r { background:var(--red-bg); border:1px solid #eac8c3; border-top:none; border-radius:0 0 0 6px; }
.c-bd-g { background:var(--grn-bg); border:1px solid #b8d9c2; border-top:none; border-radius:0 0 6px 0; }
.c-mid { position:relative; }
.ql { display:block; font-family:'DM Sans',sans-serif; font-size:10px; font-weight:600; letter-spacing:.8px; text-transform:uppercase; color:var(--ink-dim); margin:18px 0 5px; }
.ql:first-child { margin-top:0; }

mark.del, mark.ins { border-radius:3px; padding:1px 4px; cursor:crosshair; font-style:normal; transition:filter .15s, box-shadow .15s; }
mark.del { background:var(--red-mark); color:var(--red); }
mark.ins { background:var(--grn-mark); color:var(--grn); }
mark.del.lit { filter:brightness(.87); box-shadow:0 0 0 2px var(--red); }
mark.ins.lit { filter:brightness(.87); box-shadow:0 0 0 2px var(--grn); }

#svg-ol { position:fixed; top:0; left:0; width:100vw; height:100vh; pointer-events:none; z-index:999; }

.upg-hd { background:var(--purple); color:#fff; font-size:10px; font-weight:600; letter-spacing:1.2px; text-transform:uppercase; padding:9px 16px; border-radius:6px 6px 0 0; }
.upg-t { width:100%; border-collapse:collapse; font-size:12.5px; }
.upg-t tr { border-bottom:1px solid #e4e0f0; }
.upg-t tr:last-child { border-bottom:none; }
.upg-t tr:nth-child(even) { background:var(--purp-lt); }
.upg-t tr:nth-child(odd)  { background:#fff; }
.upg-t td { padding:9px 13px; vertical-align:top; line-height:1.6; }
.td-n  { width:28px; background:var(--purple); color:#fff; font-family:'DM Mono',monospace; font-size:10.5px; text-align:center; vertical-align:middle !important; }
.td-w  { width:180px; font-weight:600; color:var(--purple); font-size:11.5px; }
.td-o  { color:var(--red); font-style:italic; }
.td-a  { width:20px; color:var(--ink-dim); text-align:center; }
.td-nw { color:var(--grn); font-style:italic; }
.overall-box { background:var(--teal-lt); border:1px solid var(--teal); border-radius:8px; padding:14px 18px; margin-top:22px; font-size:13.5px; color:var(--teal-dk); line-height:1.7; }
.overall-lbl { font-size:10px; font-weight:600; letter-spacing:.8px; text-transform:uppercase; color:var(--teal); margin-bottom:5px; }

/* ── HISTORY ── */
#v-history { padding:36px 44px; background:var(--warm); }
.hg { display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:14px; margin-top:22px; }
.hc { background:var(--paper); border-radius:10px; box-shadow:var(--shadow); padding:18px 20px; cursor:pointer; transition:transform .15s,box-shadow .15s; border:1.5px solid transparent; }
.hc:hover { transform:translateY(-2px); box-shadow:0 6px 24px rgba(0,0,0,.12); border-color:var(--teal-lt); }
.hc-d { font-size:10.5px; color:var(--ink-dim); margin-bottom:7px; }
.hc-q { font-family:'EB Garamond',serif; font-size:15.5px; color:var(--teal-dk); margin-bottom:5px; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
.hc-m { display:flex; gap:7px; align-items:center; }
.hc-t { font-size:9.5px; font-weight:600; background:var(--teal-lt); color:var(--teal); padding:2px 7px; border-radius:10px; }
.hc-s { font-size:10.5px; font-family:'DM Mono',monospace; color:var(--ink-dim); }

/* ── TOAST ── */
.toast { position:fixed; bottom:24px; right:24px; background:var(--ink); color:#fff; padding:11px 18px; border-radius:8px; font-size:13px; z-index:9999; box-shadow:0 4px 20px rgba(0,0,0,.18); transform:translateY(70px); opacity:0; transition:all .28s; }
.toast.show { transform:translateY(0); opacity:1; }
.toast.ok  { background:var(--grn); }
.toast.err { background:var(--red); }
</style>
</head>
<body>

<svg id="svg-ol" xmlns="http://www.w3.org/2000/svg"></svg>
<div class="toast ok" id="toast"></div>

<!-- ═══ LOGIN ═══ -->
<div id="v-login" style="display:flex;align-items:center;justify-content:center;min-height:100vh;background:var(--warm);">
  <div class="login-box">
    <div class="ll">雅思考官尼克和他的<span>朋友们</span></div>
    <div class="ld">AI 口语教练 · 考官视角诊断 · 逐句升级到 Band 9</div>
    <div class="demo-hint">
      <strong>🔐 内测版本</strong><br>
      请使用你收到的账号和密码登录
    </div>
    <div class="fl">账号</div>
    <input class="fi" id="li-u" placeholder="账号">
    <div class="fl">密码</div>
    <input class="fi" id="li-p" type="password" placeholder="密码">
    <button class="btn-login" onclick="login()">登录</button>
  </div>
</div>

<!-- ═══ APP ═══ -->
<div id="v-app" style="display:none;">

  <!-- Sidebar -->
  <div class="sidebar">
    <div class="sb-brand">
      <div class="sb-logo">雅思考官尼克和他的<span>朋友们</span></div>
      <div class="sb-tag">AI 口语教练 · 尼克国际教育</div>
    </div>
    <div class="sb-nav">
      <button class="nb on" id="nb-p" onclick="nav('practice')"><span class="ico">✏️</span> 口语诊断练习</button>
      <a class="nb" href="/game" style="text-decoration:none"><span class="ico">⚖️</span> 雅思口语模考</a>
      <button class="nb" id="nb-h" onclick="nav('history')"><span class="ico">📋</span> 历史记录</button>
      <a class="nb" href="/guide" style="text-decoration:none"><span class="ico">📖</span> 使用说明</a>
    </div>
    <div class="sb-user">
      <div class="sb-av">👤</div>
      <div class="sb-un" id="sb-name">同学</div>
      <div>目标分数：Band 7.5</div>
      <button class="sb-out" onclick="logout()">退出登录</button>
    </div>
  </div>

  <!-- Main -->
  <div class="main">

    <!-- ── PRACTICE ── -->
    <div id="v-practice" class="view on" style="padding:36px 44px;background:var(--warm);flex:1;">
      <div class="ph">口语诊断练习</div>
      <div class="ps">输入题目和你的回答，Nick AI 用考官视角诊断问题，逐句升级到 Band 9</div>

      <div class="card">

        <!-- Quick fill -->
        <div class="fr">
          <div class="fl2">快速填入示例题目</div>
          <div class="quick-fills">
            <button class="qf-btn" onclick="fillSample('food')">🍜 P1 Food</button>
            <button class="qf-btn" onclick="fillSample('hobby')">🎨 P1 Hobbies</button>
            <button class="qf-btn" onclick="fillSample('job')">💼 P2 Dream Job</button>
            <button class="qf-btn" onclick="fillSample('book')">📖 P2 Book/Essay</button>
            <button class="qf-btn" onclick="fillSample('advice')">💬 P2 Giving Advice</button>
          </div>
        </div>

        <!-- Question + Part detect -->
        <div class="fr">
          <div class="fl2">雅思题目 <em>*</em></div>
          <input class="fi2" id="inp-q" placeholder="例如：Describe a tradition in your country." oninput="detectPart()">
          <div class="detect-hint" id="detect-hint"></div>
          <div class="part-detect-row" style="margin-top:10px;">
            <span class="part-detect-label">确认 Part：</span>
            <div class="part-badges">
              <button class="part-badge" id="pb1" onclick="setPart('P1')">Part 1</button>
              <button class="part-badge" id="pb2" onclick="setPart('P2')">Part 2</button>
              <button class="part-badge" id="pb3" onclick="setPart('P3')">Part 3</button>
            </div>
          </div>
        </div>

        <!-- Input mode -->
        <div class="fr">
          <div class="fl2">输入模式</div>
          <div class="mode-toggle">
            <button class="mode-btn on" id="mode-en" onclick="setInputMode('en')">🇬🇧 英文答案（诊断 + 升级到 Band 9）</button>
            <button class="mode-btn" id="mode-cn" onclick="setInputMode('cn')">🇨🇳 中文思路（转换为地道英文）</button>
          </div>
        </div>

        <!-- Answer -->
        <div class="fr">
          <div class="fl2" id="answer-label">你的英文回答（中文或英文均可）<em>*</em></div>

// ─── AUTH ─────────────────────────────────────────────────────────
async function login() {

  if(!u || !p){ toast('请输入账号和密码', 'err'); return; }
  const btn = document.querySelector('.btn-login');
  btn.disabled = true; btn.textContent = '登录中…';
  try {
    const res = await fetch('/api/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username: u, password: p }),
      credentials: 'include'
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.detail || '登录失败');
    document.getElementById('v-login').style.display = 'none';
    document.getElementById('v-app').style.display   = 'block';
    document.getElementById('sb-name').textContent   = data.display_name || u;
    toast('欢迎回来 👋', 'ok');
  } catch(e) {
    toast(e.message, 'err');
  } finally {
    btn.disabled = false; btn.textContent = '登录';
  }
}

// ─── PART DETECTION ───────────────────────────────────────────────
function detectPart() {
  const q = document.getElementById('inp-q').value.trim().toLowerCase();
  if(!q) return;
  let part=null, hint='';

  if(q.startsWith('describe')){
    part='P2';
    hint='🔍 检测到 <strong>Part 2</strong> · 使用 <strong>IPDOF 框架</strong>（Introduction · Past · Description · Opinion · Future）· 目标 2 分钟独白';
  } else if(/why do|how has|what are the effects|in what ways|to what extent|has.*changed|should.*government|what impact/.test(q)){
    part='P3';
    hint='🔍 检测到 <strong>Part 3</strong> · 学术讨论 · 使用 <strong>TEEL 结构</strong> · 学术 register';
  } else {
    const opinionKw = ['think','believe','important','should','better','agree','prefer'];
    const isOpinion = opinionKw.some(w=>q.includes(w));
    part='P1';
    if(isOpinion){
      hint='🔍 检测到 <strong>Part 1 后半段</strong> · 观点类 · 轻度 <strong>TEEL</strong> + Discourse Markers';
    } else {
      hint='🔍 检测到 <strong>Part 1 前半段</strong> · 对话类 · 自然聊天风格 + <strong>Fillers / Connectors</strong>';
    }
  }

  if(part){
    const el = document.getElementById('detect-hint');
    el.innerHTML = hint; el.classList.add('on');
    setPart(part, true);
  }
}

function setPart(p, auto=false){
  currentPart = p;
  ['pb1','pb2','pb3'].forEach(id=>document.getElementById(id)?.classList.remove('on'));
  const map={P1:'pb1',P2:'pb2',P3:'pb3'};
  if(map[p]) document.getElementById(map[p]).classList.add('on');
}

// ─── STREAMING HELPER ─────────────────────────────────────────────
// Streams one DeepSeek request and returns the full accumulated text
async function streamRequest(sysPrompt, userMsg, onToken){
  const resp = await fetch('/api/upgrade',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    credentials:'include',
    body:JSON.stringify({
      messages:[{role:'system',content:sysPrompt},{role:'user',content:userMsg}],
      max_tokens:1800, temperature:0.3, stream:true
    })
  });
  if(!resp.ok){
    if(resp.status===401){ toast('登录已过期，请重新登录','err'); logout(); throw new Error('未登录'); }
    const e=await resp.json().catch(()=>({})); throw new Error(e.detail||'HTTP '+resp.status);
  }
  let buffer='';
  const reader=resp.body.getReader(); const dec=new TextDecoder();
  while(true){
    const{done,value}=await reader.read(); if(done) break;
    const chunk=dec.decode(value,{stream:true});
    for(const line of chunk.split('\n')){
      if(!line.startsWith('data: ')) continue;
      const d=line.slice(6).trim(); if(d==='[DONE]') continue;
      try{
        const j=JSON.parse(d);
        const c=j.choices?.[0]?.delta?.content||'';
        if(c){ buffer+=c; if(onToken) onToken(c); }
      }catch{}
    }
  }
  return buffer;
}

function parseJSON(raw){
  const clean=raw.replace(/^```json\s*|^```\s*|```\s*$/gm,'').trim();
  return JSON.parse(clean);
}

// ─── PARSE QUESTIONS FROM INPUT ───────────────────────────────────
// Splits "Question 1. ... Question 2. ..." into [{label, questionText, answerText}]
function parseInputQuestions(topQ, answerRaw){
  // Try to detect multi-question format: "Question 1." or "Q1." prefix
  const multiRe = /Question\s*\d+[.:]?\s*/gi;
  const parts = answerRaw.split(multiRe).map(s=>s.trim()).filter(Boolean);
  if(parts.length > 1){
    return parts.map((text, i)=>({
      label: 'Q'+(i+1),
      questionText: topQ,   // reuse main question as header; per-question text is embedded
      answerText: text
    }));
  }
  // Single question
  return [{ label:'Q1', questionText: topQ, answerText: answerRaw }];
}

// ─── GENERATE (PARALLEL) ──────────────────────────────────────────
async function generate(){
  const q = document.getElementById('inp-q').value.trim();
  const a = document.getElementById('inp-a').value.trim();
  if(!q||!a){ toast('请填写题目和答案','err'); return; }

  const btn = document.getElementById('btn-gen');
  btn.classList.add('loading'); btn.disabled=true;
  document.getElementById('gen-txt').textContent='生成中…';
  showProgress();

  try {
    const isCN   = inputMode==='cn';
    const part   = currentPart || (q.toLowerCase().startsWith('describe') ? 'P2' : 'P1');
    const qItems = parseInputQuestions(q, a);   // [{label, questionText, answerText}]
    const nQ     = qItems.length;

    // ── Create one progress row per task ──
    createProgRow('meta', '考官诊断');
    qItems.forEach(item => createProgRow(item.label, item.label + ' 升级'));
    createProgRow('merge', '整合报告');

    // ── REQUEST 1: meta (diagnosis + takeaway) ──
    const metaUserMsg = isCN
      ? '题目：'+q+'\n\n学生中文思路：\n'+a
      : '题目：'+q+'\n\n学生答案：\n'+a;
    let metaPct = 0;

    const metaPromise = streamRequest(
      buildMetaPrompt(part, isCN),
      metaUserMsg,
      ()=>{ metaPct = Math.min(metaPct + 2, 95); updateProgRow('meta', metaPct); }
    ).then(raw=>{
      updateProgRow('meta', 100, '考官诊断', true);
      return parseJSON(raw);
    });

    // ── REQUESTS 2…N: one per question, all parallel ──
    const qProgPcts = qItems.map(()=>0);

    const qPromises = qItems.map((item, idx)=>{
      const userMsg = isCN
        ? '中文思路：'+item.answerText
        : '题目：'+item.questionText+'\n\n学生答案：'+item.answerText;
      return streamRequest(
        buildQuestionPrompt(part, isCN, item.label, item.questionText, item.answerText),
        userMsg,
        ()=>{
          qProgPcts[idx] = Math.min(qProgPcts[idx] + 2, 95);
          updateProgRow(item.label, qProgPcts[idx]);
        }
      ).then(raw=>{
        updateProgRow(item.label, 100, item.label + ' 升级', true);
        return parseJSON(raw);
      });
    });

    // ── WAIT FOR ALL IN PARALLEL ──
    const [metaResult, ...qResults] = await Promise.all([metaPromise, ...qPromises]);

    // ── MERGE ──
    updateProgRow('merge', 60, '整合报告');
    const rj = Object.assign({}, metaResult, { questions: qResults });
    if(isCN) rj.mode = 'cn';

    await new Promise(r=>setTimeout(r,250));
    updateProgRow('merge', 100, '整合报告', true);
    await new Promise(r=>setTimeout(r,200));

    hideProgress();
    renderReport(rj, q);
    nav('report');
    toast('报告已生成 ✓','ok');

  } catch(e){
    console.error(e); hideProgress();
    const qVal = document.getElementById('inp-q').value;
    if(qVal.toLowerCase().includes('food')){
      const mockKey = (inputMode==='cn') ? 'food_cn' : 'food';
      renderReport(MOCK_REPORTS[mockKey], qVal); nav('report'); toast('已加载示例报告','ok');
    } else {
      toast('生成失败：'+e.message,'err');
    }
  } finally {
    btn.classList.remove('loading'); btn.disabled=false;
    document.getElementById('gen-txt').textContent='✨ Nick AI 诊断 + 升级';
  }
}

// ─── CONNECTORS ───────────────────────────────────────────────────
function wireConnectors(qs, isCNMode){
  const svg=document.getElementById('svg-ol'); svg.innerHTML=''; let animId=null;
  qs.forEach((q,qi)=>{
    (q.pairs||[]).forEach((_,pi)=>{
      const key=`q${qi}p${pi}`;
      const dEl=document.querySelector(`mark.del[data-pair="${key}"]`);
      const iEl=document.querySelector(`mark.ins[data-pair="${key}"]`);
      if(!dEl||!iEl) return;
      function enter(){
        document.querySelectorAll('mark.del,mark.ins').forEach(m=>{ if(m.dataset.pair!==key) m.style.opacity='0.25'; });
        dEl.classList.add('lit'); iEl.classList.add('lit');
        svg.querySelectorAll('path,circle').forEach(e=>e.remove());
        if(animId) cancelAnimationFrame(animId);
        const dR=dEl.getBoundingClientRect(),iR=iEl.getBoundingClientRect();
        const x1=dR.right,y1=(dR.top+dR.bottom)/2,x2=iR.left,y2=(iR.top+iR.bottom)/2,mx=(x1+x2)/2;
        const path=document.createElementNS('http://www.w3.org/2000/svg','path');
        path.setAttribute('d',`M ${x1} ${y1} C ${mx} ${y1}, ${mx} ${y2}, ${x2} ${y2}`);
        path.setAttribute('stroke','#1A3A6B'); path.setAttribute('stroke-width','2.5');
        path.setAttribute('fill','none'); path.setAttribute('stroke-linecap','round');
        svg.appendChild(path);
        let off=0;
        function anim(){ off-=1.5; path.setAttribute('stroke-dasharray','8 4'); path.setAttribute('stroke-dashoffset',off); animId=requestAnimationFrame(anim); }
        anim();
        [{cx:x1,cy:y1,f:'#b83228'},{cx:x2,cy:y2,f:'#1a6b35'}].forEach(({cx,cy,f})=>{ const c=document.createElementNS('http://www.w3.org/2000/svg','circle'); c.setAttribute('cx',cx);c.setAttribute('cy',cy);c.setAttribute('r','4');c.setAttribute('fill',f);c.setAttribute('opacity','0.9'); svg.appendChild(c); });
      }
      function leave(){ document.querySelectorAll('mark.del,mark.ins').forEach(m=>m.style.opacity=''); dEl.classList.remove('lit'); iEl.classList.remove('lit'); if(animId) cancelAnimationFrame(animId); svg.querySelectorAll('path,circle').forEach(e=>e.remove()); }
      [dEl,iEl].forEach(el=>{ el.addEventListener('mouseenter',enter); el.addEventListener('mouseleave',leave); });
    });
  });
}

function loadMockReport(id){
  const h=MOCK_HISTORY.find(r=>r.id===id); if(!h) return;
  const rd=id===1?MOCK_REPORTS.food:{
    estimated_original_band:h.original_score,
    overall_comment:'（历史报告内容，接入数据库后将显示完整报告）',
    questions:[{label:'Q1',question_text:h.question,original:'历史报告内容',upgraded:'接入数据库后显示',pairs:[]}]
  };
  renderReport(rd, h.question); nav('report');
}

// ─── UTILS ────────────────────────────────────────────────────────
function esc(s){ if(!s) return ''; return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function toast(msg,type=''){ const el=document.getElementById('toast'); el.textContent=msg; el.className=`toast ${type} show`; setTimeout(()=>el.classList.remove('show'),3000); }

// ── Auto-check existing session on page load ──
(async function initApp(){
  try {
    const res = await fetch('/api/me', { credentials:'include' });
    if(res.ok){
      const data = await res.json();
      document.getElementById('sb-name').textContent = data.display_name || data.username;
      document.getElementById('v-login').style.display = 'none';
      document.getElementById('v-app').style.display   = 'block';
      nav('practice');
    }
    // else: stay on login page
  } catch(e){ /* stay on login */ }
})();
</script>
