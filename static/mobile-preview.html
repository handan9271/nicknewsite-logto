<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>Mobile Preview — Game</title>
<style>
body { margin: 0; background: #2a2a2a; display: flex; justify-content: center; align-items: flex-start; padding: 40px 20px; gap: 40px; flex-wrap: wrap; font-family: -apple-system, sans-serif; }
h1 { width: 100%; text-align: center; color: #fff; font-size: 18px; margin-bottom: 10px; }
.phone { position: relative; width: 375px; height: 812px; border: 3px solid #555; border-radius: 36px; overflow: hidden; background: #000; box-shadow: 0 0 40px rgba(0,0,0,0.5); }
.phone::before { content: ''; position: absolute; top: 0; left: 50%; transform: translateX(-50%); width: 150px; height: 28px; background: #000; border-radius: 0 0 16px 16px; z-index: 9999; }
.phone iframe { width: 100%; height: 100%; border: none; border-radius: 33px; }
.label { text-align: center; color: #aaa; font-size: 12px; margin-top: 8px; }
.phone-wrap { display: flex; flex-direction: column; align-items: center; }
</style>
</head>
<body>
<h1>iPhone 14 Pro (375 x 812) — Game Preview</h1>

<div class="phone-wrap">
  <div class="label">Title Screen</div>
  <div class="phone">
    <iframe src="/game"></iframe>
  </div>
</div>

<div class="phone-wrap">
  <div class="label">Verdict Screen</div>
  <div class="phone">
    <iframe src="/static/verdict-preview.html"></iframe>
  </div>
</div>

</body>
</html>
